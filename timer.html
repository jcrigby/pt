<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <title>pt</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
</head>
<body>
  <div id="app">
    <div id="mode-label">Focus</div>
    <div id="timer">25:00</div>
    <div id="controls">
      <button id="btn-start">Start</button>
      <button id="btn-pause" hidden>Pause</button>
      <button id="btn-reset">Reset</button>
    </div>
    <div id="sessions">0 / 8</div>
    <div id="presets">
      <button class="preset" data-minutes="5">5</button>
      <button class="preset" data-minutes="10">10</button>
      <button class="preset active" data-minutes="25">25</button>
      <button class="preset" data-minutes="30">30</button>
      <button class="preset" data-minutes="60">60</button>
    </div>
  </div>
  <a id="repo-link" href="https://github.com/jcrigby/pt">github</a>
  <script src="app.js"></script>
</body>
</html>
